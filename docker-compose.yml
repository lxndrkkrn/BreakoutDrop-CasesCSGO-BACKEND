version: '3.8'
services:

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: breakout_drop_db
      POSTGRES_USER: admin_db
      POSTGRES_PASSWORD: XdZigg!?176
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: spring_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/breakout_drop_db
      SPRING_DATASOURCE_USERNAME: admin_db
      SPRING_DATASOURCE_PASSWORD: XdZigg!?176

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  frontend:
    build:
      context: C:\Users\Alexandr\WebstormProjects\breakout-drop
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - default